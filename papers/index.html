<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHS 논문 서재</title>
<style>
  :root{
    --bg:#f3f5f8; --panel:#ffffff; --ink:#232830; --soft:#5c646d; --mute:#98a0a9;
    --line:#e7ebef; --accent:#2f6bd8; --accent-soft:#eaf1fd;
    --t1:#d64545; --t2:#e08a1e; --t3:#8b939b;
    --sidebar:264px; --radius:9px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px;}
  a{color:inherit;text-decoration:none;}
  .app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;}

  /* Sidebar */
  aside{background:var(--panel);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:16px;}
  .hublink{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--soft);
    padding:4px 6px;border-radius:6px;width:fit-content;}
  .hublink:hover{color:var(--accent);background:var(--bg);}
  .brand{display:flex;align-items:center;gap:9px;padding:2px 6px;}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
  .brand b{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .brand span{display:block;font-size:11px;color:var(--mute);font-weight:400;}
  .search{position:relative;}
  .search input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:8px;
    background:var(--bg);color:var(--ink);font-size:13px;font-family:inherit;}
  .search input:focus{outline:none;border-color:var(--accent);background:var(--panel);}
  .search .ic{position:absolute;left:10px;top:9px;color:var(--mute);font-size:14px;}
  .search kbd{position:absolute;right:8px;top:8px;font-size:10px;color:var(--mute);border:1px solid var(--line);
    border-radius:4px;padding:1px 5px;background:var(--bg);}
  .navsec{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);
    margin:2px 6px 4px;font-weight:600;}
  .navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 9px;
    border-radius:7px;cursor:pointer;color:var(--soft);font-size:13px;}
  .navitem:hover{background:var(--bg);color:var(--ink);}
  .navitem.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
  .navitem .cnt{font-size:11px;color:var(--mute);background:var(--bg);border-radius:20px;padding:1px 8px;}
  .navitem.active .cnt{background:var(--panel);color:var(--accent);}
  .tree{display:flex;flex-direction:column;gap:1px;}
  .sub{margin-left:14px;border-left:1px solid var(--line);padding-left:6px;}
  .sub .navitem{font-size:12.5px;padding:5px 9px;}
  .filters{display:flex;flex-direction:column;gap:9px;}
  .frow{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:11.5px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);
    background:var(--bg);color:var(--soft);cursor:pointer;user-select:none;}
  .chip:hover{border-color:var(--accent);color:var(--ink);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .chip.t1.on{background:var(--t1);border-color:var(--t1);}
  .chip.t2.on{background:var(--t2);border-color:var(--t2);}
  .chip.t3.on{background:var(--t3);border-color:var(--t3);}
  .flabel{font-size:11px;color:var(--mute);margin:0 6px 2px;font-weight:600;}

  /* Main */
  main{padding:0;min-width:0;}
  .toolbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);
    padding:16px 26px 12px;display:flex;flex-direction:column;gap:10px;}
  .crumb{font-size:12.5px;color:var(--mute);display:flex;align-items:center;gap:6px;}
  .crumb b{color:var(--ink);font-weight:600;}
  .toolrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .h{font-size:20px;font-weight:700;letter-spacing:-.3px;margin:0;}
  .h small{font-size:13px;color:var(--mute);font-weight:400;margin-left:8px;}
  .sort{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--soft);}
  .sort select{font-family:inherit;font-size:12.5px;padding:6px 9px;border:1px solid var(--line);
    border-radius:7px;background:var(--panel);color:var(--ink);}
  .content{padding:16px 26px 60px;}

  /* Dashboard */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .metric .lab{font-size:12px;color:var(--mute);}
  .metric .val{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:3px;}
  .metric .val i{font-size:13px;font-weight:400;color:var(--soft);margin-left:4px;}
  .dashsec{margin-bottom:24px;}
  .dashsec h2{font-size:14px;font-weight:700;margin:0 0 10px;display:flex;align-items:center;gap:7px;}
  .dashsec h2 .mini{font-size:12px;color:var(--mute);font-weight:400;}
  .topicgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .topiccard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer;
    transition:border-color .15s,transform .15s;}
  .topiccard:hover{border-color:var(--accent);transform:translateY(-2px);}
  .topiccard .tt{font-size:15px;font-weight:700;margin-bottom:3px;}
  .topiccard .td{font-size:12px;color:var(--mute);margin-bottom:12px;}
  .topiccard .bar{display:flex;height:6px;border-radius:20px;overflow:hidden;background:var(--bg);}
  .topiccard .bar i{display:block;height:100%;}
  .topiccard .meta{font-size:11.5px;color:var(--soft);margin-top:9px;display:flex;gap:10px;flex-wrap:wrap;}

  /* List rows */
  .list{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .row{display:grid;grid-template-columns:8px 1fr auto;gap:14px;align-items:center;
    padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;position:relative;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:var(--bg);}
  .row.read{opacity:.5;}
  .row.read:hover{opacity:.85;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.t1{background:var(--t1);} .dot.t2{background:var(--t2);} .dot.t3{background:var(--t3);}
  .row .main{min-width:0;}
  .row .ttl{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .sub2{font-size:12px;color:var(--soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:.03em;}
  .badge.en{background:#e5f0ff;color:#1f5bbf;}
  .kw{font-size:11px;color:var(--mute);}
  .kw::before{content:"#";opacity:.6;}
  .row .right{display:flex;align-items:center;gap:14px;}
  .yr{font-size:12.5px;color:var(--mute);font-variant-numeric:tabular-nums;}
  .rd{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--mute);}
  .rd input{accent-color:var(--accent);cursor:pointer;}
  .empty{padding:60px 20px;text-align:center;color:var(--mute);}
  .foot{padding:16px 4px;text-align:center;color:var(--mute);font-size:12px;}
</style>
</head>

<div class="app">
  <aside>
    <a class="hublink" href="../">← KHS Research</a>
    <div class="brand">
      <div class="logo">K</div>
      <div><b>KHS 논문 서재</b><span>고형석 · Research Library</span></div>
    </div>
    <div class="search">
      <span class="ic">⌕</span>
      <input id="q" type="text" placeholder="제목·저자·키워드 검색">
      <kbd>/</kbd>
    </div>
    <div>
      <div class="navitem active" data-nav="home" id="nav-home"><span>🏠 홈 · 대시보드</span></div>
      <div class="navitem" data-nav="all" id="nav-all"><span>📚 전체 논문</span><span class="cnt" id="cnt-all"></span></div>

    <div>
      <div class="navsec">분야</div>
      <div class="tree" id="tree"></div>

    <div class="filters">
      <div class="navsec">필터</div>
      <div><div class="flabel">등급</div><div class="frow" id="tierf">

      </div></div>
      <div><div class="flabel">언어</div><div class="frow" id="langf">
        <div class="chip" data-lang="ko">한국어</div><div class="chip" data-lang="en">영어</div>
      </div></div>
      <div><div class="flabel">읽음</div><div class="frow" id="readf">
        <div class="chip" data-read="unread">안 읽음</div><div class="chip" data-read="read">읽음</div>
      </div></div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="crumb" id="crumb"></div>
      <div class="toolrow">
        <h2 class="h" id="title"></h2>
        <div class="sort">정렬
          <select id="sort">
            <option value="year">연도 ↓ (최신)</option>
            <option value="tier">등급 순</option>
            <option value="title">제목 (가나다)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

roof", "reinforcement learning"], "stem": "Sutton_NeurIPS_2000", "tier": 2, "lang": "ko", "url": "Basic_Theory/Sutton_NeurIPS_2000.html", "topic": "Basic_Theory", "sub": null}, {"title": "Learning to Hop for a Single-Legged Robot with Parallel Mechanism", "authors": "Hongbo Zhang, Xiangyu Chu, Yanlin Chen, Yunxi Tang, Linzhu Yue, Yun-Hui Liu, Kwok Wai Samuel Au", "authors_short": "Hongbo Zhang et al.", "journal": "Preprint, arXiv:2501.11945v1 [cs.RO], 21 Jan 2025 · open-source package at github.com/CUHK-BRME/OMEGA", "year": "1945", "venue": "Preprint", "keywords": ["reinforcement learning", "legged robot", "parallel mechanism", "sim-to-real transfer", "single-legged hopping", "torque-level conversion", "under-actuation", "variational autoencoder"], "stem": "Zhang_arXiv_2025", "tier": 3, "lang": "ko", "url": "Multimodal_Locomotion_Robots/RL_Legged_Control/Zhang_arXiv_2025.html", "topic": "Multimodal_Locomotion_Robots", "sub": "RL_Legged_Control"}, {"title": "Cycloidal Quasi-Direct Drive Actuator Designs with Learning-based Torque Estimation for Legged Robotics", "authors": "Alvin Zhu, Yusuke Tanaka, Fadi Rafeedi, Dennis Hong", "authors_short": "Alvin Zhu et al.", "journal": "IEEE International Conference on Robotics and Automation (ICRA) (arXiv:2412.16165v2) · A. Zhu and Y. Tanaka assert joint first authorship", "year": "", "venue": "IEEE International Conference on Robotics and Automation", "keywords": ["cycloidal drive", "quasi-direct drive actuator", "legged robotics", "torque estimation", "actuator network", "gated recurrent unit", "sim-to-real transfer", "reinforcement learning"], "stem": "Zhu_ICRA_2024", "tier": 1, "lang": "ko", "url": "Multimodal_Locomotion_Robots/RL_Legged_Control/Zhu_ICRA_2024.html", "topic": "Multimodal_Locomotion_Robots", "sub": "RL_Legged_Control"}];
// Korean display labels / colors / sub ordering — edit in run.py TOPIC_LABELS.
const TOPICS = {"Multimodal_Locomotion_Robots": {"ko": "멀티모달 로코모션 로봇", "color": "#2f6bd8", "subs": {"RL_Legged_Control": "RL 다리 제어", "Hybrid_Platforms": "하이브리드 플랫폼", "Perching_Landing": "착지·퍼칭", "RL_Flapping_Control": "RL 플래핑 제어", "Review_Paper": "리뷰"}}, "Basic_Theory": {"ko": "기초 이론", "color": "#1d9e75", "subs": null}, "Flapping_Wing_Air_Vehicle": {"ko": "플래핑윙 비행체", "color": "#d4537e", "subs": {"Hardware_Development": "하드웨어", "Analysis_Methods": "해석", "Experimental_Study": "실험"}}};
const UPDATED = "2026-07-07 22:24";

const state = {view:"home", topic:null, sub:null, q:"", tier:new Set(), lang:new Set(), read:new Set(), sort:"year"};
const isRead = p => localStorage.getItem("r:"+p.stem)==="1";
const setRead = (p,v)=> v?localStorage.setItem("r:"+p.stem,"1"):localStorage.removeItem("r:"+p.stem);

// ---- Label / structure helpers (config supplies labels+order; counts from data) ----
const labelize = k => (k||"").replace(/_/g," ");
const topicKo = t => (TOPICS[t] && TOPICS[t].ko) || labelize(t);
const subKo = (t,s) => (TOPICS[t] && TOPICS[t].subs && TOPICS[t].subs[s]) || labelize(s);
const yearNum = p => Number(p.year) || 0;

function topicCount(t){return P.filter(p=>p.topic===t).length;}
function subCount(t,s){return P.filter(p=>p.topic===t&&p.sub===s).length;}

// topics that actually have papers, ordered by config key order then any extras
function topicsInData(){
 const present=[...new Set(P.map(p=>p.topic))];
 const order=Object.keys(TOPICS);
 return present.sort((a,b)=>{
   const ia=order.indexOf(a), ib=order.indexOf(b);
   return (ia<0?1e9:ia)-(ib<0?1e9:ib) || a.localeCompare(b);
 });
}
// non-null subs present for a topic, ordered by config then extras
function subsInData(t){
 const present=[...new Set(P.filter(p=>p.topic===t&&p.sub).map(p=>p.sub))];
 const cfg=(TOPICS[t]&&TOPICS[t].subs)?Object.keys(TOPICS[t].subs):[];
 return present.sort((a,b)=>{
   const ia=cfg.indexOf(a), ib=cfg.indexOf(b);
   return (ia<0?1e9:ia)-(ib<0?1e9:ib) || a.localeCompare(b);
 });
}

function buildTree(){
 const tree=document.getElementById("tree"); tree.innerHTML="";
 topicsInData().forEach(t=>{
   const it=document.createElement("div"); it.className="navitem"; it.dataset.topic=t;
   it.innerHTML=`<span>${topicKo(t)}</span><span class="cnt">${topicCount(t)}</span>`;
   it.onclick=()=>{state.view="topic";state.topic=t;state.sub=null;sync();};
   tree.appendChild(it);
   const subs=subsInData(t);
   if(subs.length){
     const wrap=document.createElement("div"); wrap.className="sub";
     subs.forEach(s=>{
       const si=document.createElement("div"); si.className="navitem"; si.dataset.topic=t; si.dataset.sub=s;
       si.innerHTML=`<span>${subKo(t,s)}</span><span class="cnt">${subCount(t,s)}</span>`;
       si.onclick=()=>{state.view="topic";state.topic=t;state.sub=s;sync();};
       wrap.appendChild(si);
     });
     tree.appendChild(wrap);
   }
 });
 document.getElementById("cnt-all").textContent=P.length;
}

function filtered(){
 let r=P.slice();
 if(state.view==="topic"&&state.topic){r=r.filter(p=>p.topic===state.topic);if(state.sub)r=r.filter(p=>p.sub===state.sub);}
 if(state.q){const toks=state.q.toLowerCase().split(/\s+/);r=r.filter(p=>{const t=(p.title+" "+p.authors_short+" "+p.year+" "+p.venue+" "+(p.keywords||[]).join(" ")).toLowerCase();return toks.every(x=>t.includes(x));});}
 if(state.tier.size)r=r.filter(p=>state.tier.has(String(p.tier)));
 if(state.lang.size)r=r.filter(p=>state.lang.has(p.lang));
 if(state.read.size){r=r.filter(p=>{const rd=isRead(p);return (state.read.has("read")&&rd)||(state.read.has("unread")&&!rd);});}
 if(state.sort==="year")r.sort((a,b)=>yearNum(b)-yearNum(a));
 else if(state.sort==="tier")r.sort((a,b)=>((a.tier||9)-(b.tier||9))||yearNum(b)-yearNum(a));
 else r.sort((a,b)=>a.title.localeCompare(b.title));
 return r;
}

function rowHtml(p){
 const rd=isRead(p);
 const kws=(p.keywords||[]).slice(0,3).map(k=>`<span class="kw">${k}</span>`).join(" ");
 const en=p.lang==="en"?`<span class="badge en">EN</span>`:"";
 const dot=p.tier?`t${p.tier}`:"";
 return `<div class="row ${rd?'read':''}" data-stem="${p.stem}">
   <div class="dot ${dot}"></div>
   <div class="main"><div class="ttl">${p.title}</div>
     <div class="sub2">${p.authors_short} · ${p.venue} ${en} ${kws}</div></div>
   <div class="right"><span class="yr">${p.year}</span>
     <label class="rd" onclick="event.stopPropagation()"><input type="checkbox" ${rd?'checked':''} data-rd="${p.stem}"> 읽음</label></div>
 </div>`;
}

function renderList(r){
 if(!r.length)return `<div class="list"><div class="empty">조건에 맞는 논문이 없어요.</div></div>`;
 return `<div class="list">${r.map(rowHtml).join("")}</div><div class="foot">${r.length}편 표시</div>`;
}

function renderHome(){
 const total=P.length, read=P.filter(isRead).length, unread=total-read;
 const topics=topicsInData();
 const recent=P.slice().sort((a,b)=>yearNum(b)-yearNum(a)).slice(0,5);
 let html=`<div class="metrics">
   <div class="metric"><div class="lab">전체 논문</div><div class="val">${total}<i>편</i></div></div>
   <div class="metric"><div class="lab">안 읽음</div><div class="val">${unread}<i>편</i></div></div>
   <div class="metric"><div class="lab">분야</div><div class="val">${topics.length}<i>개</i></div></div>
   <div class="metric"><div class="lab">읽음</div><div class="val">${read}<i>편</i></div></div>
 </div>`;
 html+=`<div class="dashsec"><h2>분야 바로가기 <span class="mini">클릭해서 들어가기</span></h2><div class="topicgrid">`;
 topics.forEach(t=>{
   const c=topicCount(t); const t1=P.filter(p=>p.topic===t&&p.tier===1).length;
   const t2=P.filter(p=>p.topic===t&&p.tier===2).length; const t3=c-t1-t2;
   const seg=(n,col)=>n?`<i style="width:${n/c*100}%;background:${col}"></i>`:"";
   const subs=subsInData(t);
   const subtxt=subs.length?subs.map(s=>`${subKo(t,s)} ${subCount(t,s)}`).join(" · "):"세부 없음";
   html+=`<div class="topiccard" data-gotopic="${t}"><div class="tt">${topicKo(t)}</div>
     <div class="td">${c}편</div>
     <div class="bar">${seg(t1,'var(--t1)')}${seg(t2,'var(--t2)')}${seg(t3,'var(--t3)')}</div>
     <div class="meta">${subtxt}</div></div>`;
 });
 html+=`</div></div>`;
 html+=`<div class="dashsec"><h2>최근 추가 <span class="mini">연도 기준</span></h2>${renderList(recent)}</div>`;
 return html;
}

function sync(){
 document.querySelectorAll('aside .navitem').forEach(n=>n.classList.remove('active'));
 if(state.view==="home")document.getElementById('nav-home').classList.add('active');
 else if(state.view==="all")document.getElementById('nav-all').classList.add('active');
 else{document.querySelectorAll('#tree .navitem').forEach(n=>{if(n.dataset.topic===state.topic&&((n.dataset.sub||null)===state.sub))n.classList.add('active');});}
 const crumb=document.getElementById('crumb'); const title=document.getElementById('title');
 if(state.view==="home"){crumb.innerHTML=`<b>홈</b>`;title.innerHTML=`안녕하세요, 고형석님 👋 <small>마지막 갱신 ${UPDATED}</small>`;}
 else if(state.view==="all"){crumb.innerHTML=`홈 › <b>전체 논문</b>`;title.innerHTML=`전체 논문 <small>${filtered().length}편</small>`;}
 else{const tk=topicKo(state.topic);const sk=state.sub?subKo(state.topic,state.sub):null;
   crumb.innerHTML=`홈 › ${tk}${sk?` › <b>${sk}</b>`:''}`;title.innerHTML=`${sk||tk} <small>${filtered().length}편</small>`;}
 const content=document.getElementById('content');
 content.innerHTML = state.view==="home" ? renderHome() : renderList(filtered());
 bindRows();
}
function openPaper(stem){const p=P.find(x=>x.stem===stem);if(p&&p.url)window.open(p.url,"_blank","noopener");}
function bindRows(){
 document.querySelectorAll('.row').forEach(r=>{r.onclick=()=>openPaper(r.dataset.stem);});
 document.querySelectorAll('input[data-rd]').forEach(cb=>{cb.onchange=()=>{const p=P.find(x=>x.stem===cb.dataset.rd);setRead(p,cb.checked);sync();};});
 document.querySelectorAll('[data-gotopic]').forEach(c=>{c.onclick=()=>{state.view="topic";state.topic=c.dataset.gotopic;state.sub=null;sync();};});
}

document.getElementById('nav-home').onclick=()=>{state.view="home";state.topic=null;state.sub=null;sync();};
document.getElementById('nav-all').onclick=()=>{state.view="all";state.topic=null;state.sub=null;sync();};
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value;if(state.view==="home"&&state.q)state.view="all";sync();});
document.getElementById('sort').addEventListener('change',e=>{state.sort=e.target.value;sync();});
function toggleChip(container,set,attr){document.querySelectorAll(container+' .chip').forEach(c=>{c.onclick=()=>{const v=c.dataset[attr];if(set.has(v)){set.delete(v);c.classList.remove('on');}else{set.add(v);c.classList.add('on');}if(state.view==="home")state.view="all";sync();};});}
function singleChip(container,set,attr){document.querySelectorAll(container+' .chip').forEach(c=>{c.onclick=()=>{const v=c.dataset[attr];const wasOn=set.has(v);set.clear();document.querySelectorAll(container+' .chip').forEach(x=>x.classList.remove('on'));if(!wasOn){set.add(v);c.classList.add('on');}if(state.view==="home")state.view="all";sync();};});}
toggleChip('#tierf',state.tier,'tier');toggleChip('#langf',state.lang,'lang');singleChip('#readf',state.read,'read');
document.addEventListener('keydown',e=>{if(e.key==="/"&&document.activeElement.id!=="q"){e.preventDefault();document.getElementById('q').focus();}});

buildTree();sync();
</script>
</body>
</html>
