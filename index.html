<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHS Research — Hyeong-Seok Ko</title>
<style>
  :root{
    --bg:#f3f5f8; --panel:#ffffff; --ink:#232830; --soft:#5c646d; --mute:#98a0a9;
    --line:#e7ebef; --accent:#2f6bd8; --accent-soft:#eaf1fd; --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px;
    min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}

  /* Top brand bar */
  header.top{background:var(--panel);border-bottom:1px solid var(--line);}
  .top-inner{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:10px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
  .brand b{font-size:15px;font-weight:700;letter-spacing:-.2px;}

  /* Hero */
  .hero{max-width:960px;margin:0 auto;padding:56px 24px 30px;}
  .hero h1{font-size:38px;font-weight:800;letter-spacing:-.8px;margin:0 0 8px;}
  .hero .sub{font-size:16px;color:var(--soft);margin:0;}
  .hero .rule{width:44px;height:4px;background:var(--accent);border-radius:4px;margin:20px 0 0;}

  /* Section cards */
  main{max-width:960px;margin:0 auto;padding:20px 24px 64px;width:100%;flex:1;}
  .secgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 22px 20px;display:flex;flex-direction:column;min-height:170px;
    transition:border-color .16s,transform .16s,box-shadow .16s;position:relative;}
  a.card:hover{border-color:var(--accent);transform:translateY(-3px);
    box-shadow:0 6px 20px rgba(47,107,216,.10);}
  .card .ic{font-size:24px;margin-bottom:12px;}
  .card h2{font-size:17px;font-weight:700;margin:0 0 5px;letter-spacing:-.2px;}
  .card p{font-size:13px;color:var(--soft);margin:0;}
  .card .go{margin-top:auto;padding-top:14px;font-size:13px;font-weight:600;color:var(--accent);}
  .badge{position:absolute;top:16px;right:16px;font-size:11px;font-weight:700;
    padding:2px 9px;border-radius:20px;letter-spacing:.02em;}
  .badge.live{background:var(--accent-soft);color:var(--accent);}
  .badge.soon{background:#eef0f3;color:var(--mute);}
  .card.disabled{opacity:.62;cursor:default;}
  .card.disabled h2,.card.disabled .ic{color:var(--soft);}
  .card.disabled .go{color:var(--mute);}

  footer{max-width:960px;margin:0 auto;padding:20px 24px 34px;color:var(--mute);font-size:12.5px;width:100%;}
</style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="./">
        <span class="logo">K</span>
        <b>KHS Research</b>
      </a>
    </div>
  </header>

  <section class="hero">
    <h1>KHS Research</h1>
    <p class="sub">Hyeong-Seok Ko · 고형석</p>
    <div class="rule"></div>
  </section>

  <main>
    <div class="secgrid">
      <a class="card" href="papers/">
        <span class="badge live">92편</span>
        <div class="ic">📚</div>
        <h2>논문 서재</h2>
        <p>읽고 정리한 논문 요약 라이브러리. 분야별로 탐색하고 검색·필터링할 수 있습니다.</p>
        <div class="go">서재 열기 →</div>
      </a>
      <div class="card disabled" aria-disabled="true">
        <span class="badge soon">곧 공개</span>
        <div class="ic">📝</div>
        <h2>이론 노트</h2>
        <p>강화학습·제어·비행역학 등 공부하며 정리한 이론 노트.</p>
        <div class="go">준비 중</div>
      </div>
      <div class="card disabled" aria-disabled="true">
        <span class="badge soon">곧 공개</span>
        <div class="ic">🎓</div>
        <h2>연구 실적·활동</h2>
        <p>연구 실적, 프로젝트, 활동 이력.</p>
        <div class="go">준비 중</div>
      </div>
    </div>
  </main>

  <footer>© Hyeong-Seok Ko · KAIST SSHS Lab</footer>
</body>
</html>
